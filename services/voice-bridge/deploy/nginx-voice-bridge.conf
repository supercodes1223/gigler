# nginx reverse proxy for the Gigler voice bridge.
# Install to /etc/nginx/sites-available/voice-bridge, symlink to sites-enabled,
# then run: certbot --nginx -d voice.gigler.ai (certbot rewrites for TLS).

server {
    listen 80;
    server_name voice.gigler.ai;

    location /ws {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
