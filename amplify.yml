version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - npm install --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm install --cache .npm --prefer-offline
    build:
      commands:
        - cp amplify_outputs.json src/amplify_outputs.json 2>/dev/null || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
