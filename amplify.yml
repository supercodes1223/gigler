version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - npm install --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm install --cache .npm --prefer-offline
    build:
      commands:
        - cp amplify_outputs.json src/amplify_outputs.json 2>/dev/null || true
        # Amplify Hosting console env vars are build-time only; Next.js SSR needs
        # them at runtime, so persist the server-side ones into .env.production.
        - env | grep -E '^(APPSYNC_URL|APPSYNC_API_KEY|TWILIO_ACCOUNT_SID|TWILIO_AUTH_TOKEN|TWILIO_MESSAGING_SERVICE_SID|COOKIE_SECRET|NEXT_PUBLIC_SITE_URL)=' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
